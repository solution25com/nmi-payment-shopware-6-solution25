name: Shopware Plugin Verification

on:
  pull_request:
    branches: [main, develop]
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-plugin:
    name: Verify Shopware Plugin
    runs-on: ubuntu-latest  

    strategy:
      fail-fast: false
      matrix:
        version-selection: ['lowest', 'highest']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'  
          tools: composer:v2, phpstan, phpcs 

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: phpstan analyse src --level=5
     
      - name: Run PHPCS
        run: phpcs --standard=PSR12 src/
      
      - name: Fail on Verification Errors
        if: failure()
        run: exit 1
