name: Shopware Plugin Verification

on:
  pull_request:
    branches: [main, develop]
  push:
    tags:
      - "v*.*.*"

jobs:
  verify-plugin:
    name: Verify Shopware Plugin
    runs-on: ubuntu-latest  

    strategy:
      fail-fast: false
      matrix:
        version-selection: ['lowest', 'highest']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'  
          tools: composer:v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node.js dependencies
        run: npm install --prefix tools/js

      - name: Run Shopware Extension Verifier
        run: go run . check --check-against=${{ matrix.version-selection }}

      - name: Fail on Verification Errors
        if: failure()
        run: exit 1
